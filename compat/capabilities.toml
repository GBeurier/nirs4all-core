# Machine-readable capability ledger for the portable operator subset exposed by
# each nirs4all aggregate language binding (shipping as `nirs4all-core` in
# Python and `nirs4all` in non-Python registries).
#
# Capability levels use the vocabulary defined in docs/OPERATORS.md:
#   metadata | plan | execute-local | execute-remote | parity-validated
#
# Honesty rule: every claim here is enforced by
# bindings/python/tests/test_capability_matrix.py against the binding sources and
# parity gate files. A binding may not claim `execute-local` (or better) without
# a real run symbol, nor `parity-validated` without a real parity gate. The
# aggregate never re-implements numerical logic; execution always delegates to
# the `methods` upstream (nirs4all-methods / libn4m / +n4m / n4m).

# The portable operator subset every binding must expose consistently. This list
# MUST equal nirs4all_core.PORTABLE_OPERATOR_CLASSES (checked by the gate) and is
# also cross-checked binding-by-binding in test_cross_language_surface.py.
portable_operator_subset = [
  "nirs4all.operators.splitters.KennardStoneSplitter",
  "nirs4all.operators.splitters.splitters.KennardStoneSplitter",
  "nirs4all.operators.transforms.SNV",
  "nirs4all.operators.transforms.StandardNormalVariate",
  "nirs4all.operators.transforms.scalers.StandardNormalVariate",
  "nirs4all.operators.transforms.SavitzkyGolay",
  "nirs4all.operators.transforms.nirs.SavitzkyGolay",
  "sklearn.cross_decomposition.PLSRegression",
  "sklearn.cross_decomposition._pls.PLSRegression",
]

runtime_surfaces = [
  "python",
  "r",
  "javascript_wasm",
  "rust",
  "matlab_octave",
]

# Portable Kennard-Stone / SNV / Savitzky-Golay / PLS pipeline execution.
# Numerics are delegated to the `methods` upstream in every binding; the
# aggregate owns only parsing, orchestration, and result-shape translation.
[portable_pipeline]
level = "parity-validated"
upstream = "methods"
oracle = "tests/parity/expected/portable_python_oracle.json"

# Per-binding capability. `run_symbol` must appear in `run_source`; when the
# level is `parity-validated`, `parity_gate` must exist (and `parity_symbol`, if
# given, must appear in it). `execution` records HOW numerics are reached so the
# claim stays auditable.
[[binding]]
language = "python"
level = "parity-validated"
run_symbol = "run_portable_pipeline"
run_source = "bindings/python/src/nirs4all_core/_execution.py"
parity_gate = "bindings/python/tests/test_execution_parity.py"
execution = "nirs4all-methods Python binding (n4m / pls4all) via libn4m"

[[binding]]
language = "rust"
level = "parity-validated"
run_symbol = "run_portable_pipeline_with_library"
run_source = "bindings/rust/nirs4all/src/lib.rs"
parity_gate = "bindings/rust/nirs4all/src/lib.rs"
parity_symbol = "rust_binding_execution_matches_full_python_nirs4all_oracle"
execution = "caller-supplied libn4m shared library (NIRS4ALL_METHODS_LIB)"

[[binding]]
language = "wasm"
level = "parity-validated"
run_symbol = "runPortablePipeline"
run_source = "bindings/wasm/src/execution.js"
parity_gate = "bindings/wasm/tests/parity.test.js"
execution = "@nirs4all/methods module"

[[binding]]
language = "r"
level = "parity-validated"
run_symbol = "nirs4all_run_portable_pipeline"
run_source = "bindings/r/R/execution.R"
parity_gate = "bindings/r/tests/parity.R"
execution = "nirs4all-methods R binding (n4m / pls4all)"

[[binding]]
language = "matlab"
level = "parity-validated"
run_symbol = "runPortablePipeline"
run_source = "bindings/matlab/+nirs4all/runPortablePipeline.m"
parity_gate = "bindings/matlab/tests/parity.m"
execution = "nirs4all-methods +n4m MATLAB/Octave MEX shims"

# Runtime host contracts separate portable pipeline parity from the narrower
# ability to hydrate a serialized selected model and run prediction later. Only
# JavaScript/WASM exposes that standalone predict contract today.
[[runtime_contract]]
surface = "python"
pipeline_execution = "parity-validated"
pipeline_entrypoint = "run_portable_pipeline"
serialized_model_predict = false

[[runtime_contract]]
surface = "r"
pipeline_execution = "parity-validated"
pipeline_entrypoint = "nirs4all_run_portable_pipeline"
serialized_model_predict = false

[[runtime_contract]]
surface = "javascript_wasm"
pipeline_execution = "parity-validated"
pipeline_entrypoint = "runPortablePipeline"
serialized_model_predict = true
predict_entrypoint = "predictPortablePipeline"
predict_parity_gate = "bindings/wasm/tests/parity.test.js"

[[runtime_contract]]
surface = "rust"
pipeline_execution = "parity-validated"
pipeline_entrypoint = "run_portable_pipeline_with_library"
serialized_model_predict = false

[[runtime_contract]]
surface = "matlab_octave"
pipeline_execution = "parity-validated"
pipeline_entrypoint = "runPortablePipeline"
serialized_model_predict = false

# Stable controller/capability descriptors consumed by app hosts (`nirs4all-ui`,
# `nirs4all-web`, Studio, and bespoke browser/desktop shells). These rows are a
# contract for graph builders and runtime selectors; execution still goes
# through the portable pipeline entry point and the `methods` upstream.
[[controller]]
id = "split.kennard_stone"
kind = "splitter"
domain = "methods"
label = "Kennard-Stone split"
operator_classes = [
  "nirs4all.operators.splitters.KennardStoneSplitter",
  "nirs4all.operators.splitters.splitters.KennardStoneSplitter",
]
inputs = ["X"]
outputs = ["train_indices", "test_indices"]
parameters = ["test_size"]
runtime = { python = "parity-validated", r = "parity-validated", javascript_wasm = "parity-validated", rust = "parity-validated", matlab_octave = "parity-validated" }
execution_path = "portable_pipeline"

[[controller]]
id = "preprocess.snv"
kind = "transform"
domain = "methods"
label = "Standard normal variate"
operator_classes = [
  "nirs4all.operators.transforms.SNV",
  "nirs4all.operators.transforms.StandardNormalVariate",
  "nirs4all.operators.transforms.scalers.StandardNormalVariate",
]
inputs = ["X"]
outputs = ["X_transformed"]
parameters = []
runtime = { python = "parity-validated", r = "parity-validated", javascript_wasm = "parity-validated", rust = "parity-validated", matlab_octave = "parity-validated" }
execution_path = "portable_pipeline"

[[controller]]
id = "preprocess.savgol"
kind = "transform"
domain = "methods"
label = "Savitzky-Golay"
operator_classes = [
  "nirs4all.operators.transforms.SavitzkyGolay",
  "nirs4all.operators.transforms.nirs.SavitzkyGolay",
]
inputs = ["X"]
outputs = ["X_transformed"]
parameters = ["window_length", "polyorder", "deriv", "mode", "cval"]
runtime = { python = "parity-validated", r = "parity-validated", javascript_wasm = "parity-validated", rust = "parity-validated", matlab_octave = "parity-validated" }
execution_path = "portable_pipeline"

[[controller]]
id = "model.pls_regression"
kind = "model"
domain = "methods"
label = "PLS regression"
operator_classes = [
  "sklearn.cross_decomposition.PLSRegression",
  "sklearn.cross_decomposition._pls.PLSRegression",
]
inputs = ["X", "y"]
outputs = ["predictions", "model"]
parameters = ["n_components", "_range_"]
runtime = { python = "parity-validated", r = "parity-validated", javascript_wasm = "parity-validated", rust = "parity-validated", matlab_octave = "parity-validated" }
execution_path = "portable_pipeline"

[[controller]]
id = "pipeline.portable_methods"
kind = "pipeline"
domain = "methods"
label = "Portable methods pipeline"
operator_classes = []
inputs = ["pipeline", "dataset"]
outputs = ["execution_result", "predictions", "model"]
parameters = []
runtime = { python = "parity-validated", r = "parity-validated", javascript_wasm = "parity-validated", rust = "parity-validated", matlab_octave = "parity-validated" }
execution_path = "run_portable_pipeline"
composes = [
  "split.kennard_stone",
  "preprocess.snv",
  "preprocess.savgol",
  "model.pls_regression",
]

# Upstream domains (formats, io, datasets, dag_ml, dag_ml_data) are re-exported
# through lazy import proxies/loaders only. The aggregate itself does not wrap or
# execute their operators, so its own capability over them is `metadata`; the
# actual execution capability is whatever the installed upstream provides. This
# is recorded honestly rather than claimed as aggregate execution.
[upstream_domains]
level = "metadata"
note = "lazy re-export only; execution capability is upstream-provided"
keys = ["formats", "io", "datasets", "dag_ml", "dag_ml_data"]

# Native conformal/robustness contracts exist today in the full Python
# `nirs4all` package, not in this aggregate. nirs4all-core records the portable
# artifact names so app hosts and bindings can fail loudly instead of inventing
# a local parser, calibrator, quantile implementation, or robustness metric.
[[artifact_contract]]
id = "conformal.calibrated_result"
schema = "nirs4all.dagml.conformal_store.v1"
producer = "full-python-nirs4all"
consumer_level = { python = "metadata", r = "metadata", javascript_wasm = "metadata", rust = "metadata", matlab_octave = "metadata" }
python_surface = "nirs4all.calibrate / nirs4all.predict_calibrated / nirs4all.load_calibrated_result"
portable_claim = "not-exposed-in-nirs4all-core"
optional_payload_fields = ["conformal_guarantee_status", "calibration_replay_source", "tuning_calibration_source"]
required_registry_entries = []
notes = "Bindings may transport or display the guarantee badge and calibration replay provenance carried by full Python nirs4all, but must not reimplement conformal quantiles, interval application, refit, recalibration, or local calibration replay until upstream conformal fixtures and binding APIs are promoted."

[[artifact_contract]]
id = "robustness.summary"
schema = "https://nirs4all.org/schemas/robustness-summary/v1"
producer = "full-python-nirs4all"
consumer_level = { python = "metadata", r = "metadata", javascript_wasm = "metadata", rust = "metadata", matlab_octave = "metadata" }
python_surface = "nirs4all.RobustnessReport.summary_artifact / nirs4all.robustness_summary_schema_json"
portable_claim = "summary-json-contract-only"
optional_payload_fields = ["conformal_guarantee_status", "spectral_replay"]
required_registry_entries = []
notes = "Bindings and app hosts may render validated summary.json cards, the optional conformal_guarantee_status badge, and optional spectral_replay provenance carried by the summary artifact, but must not recompute robustness metrics, replay spectra, or infer conformal guarantees from summary rows."

[[artifact_contract]]
id = "tuning.summary"
schema = "https://nirs4all.org/schemas/tuning-summary/v1"
producer = "full-python-nirs4all"
consumer_level = { python = "metadata", r = "metadata", javascript_wasm = "metadata", rust = "metadata", matlab_octave = "metadata" }
python_surface = "nirs4all.TuningResult.summary_artifact / nirs4all.tuning_summary_schema_json"
portable_claim = "summary-json-contract-only"
optional_payload_fields = ["sampler", "pruner", "seed", "persistence", "trials[*].diagnostics"]
required_registry_entries = []
notes = "Bindings and app hosts may render validated tuning summary cards, including optional optimizer metadata sampler/pruner/seed, the optional safe persistence flags block, and compact scalar per-trial diagnostics. They must not drive optimizers, replay HPO trials, infer runtime tuning capability from summary rows, or require raw optimizer storage URIs."

[[artifact_contract]]
id = "tuning.ordered_search_space"
schema = "https://nirs4all.org/schemas/tuning-ordered-search-space/v1"
producer = "full-python-nirs4all"
consumer_level = { python = "metadata", r = "metadata", javascript_wasm = "metadata", rust = "metadata", matlab_octave = "metadata" }
python_surface = "nirs4all.inspect_tuning_space / nirs4all.NativeTuning.inspect_space / nirs4all.tuning_space_schema_json / nirs4all CLI tuning-space"
portable_claim = "search-space-json-contract-only"
optional_payload_fields = []
required_registry_entries = ["run.tuning.space", "run.tuning.force_params"]
notes = "Bindings and app hosts may validate, transport, or render the ordered pre-execution tuning search-space preview produced by full Python nirs4all, including ordered parameter paths and force_params subset checks, but must not mutate pipelines, drive optimizers, reproduce TCV1 fingerprints locally, or infer execution support from this metadata-only contract."

[[artifact_contract]]
id = "keyword.registry"
schema = "nirs4all.keyword_registry.v1"
producer = "full-python-nirs4all"
consumer_level = { python = "metadata", r = "metadata", javascript_wasm = "metadata", rust = "metadata", matlab_octave = "metadata" }
python_surface = "nirs4all.get_keyword_registry / nirs4all.keyword_registry_json / nirs4all.keyword_registry_schema_json / nirs4all.TUNING_OPTIMIZER_PERSISTENCE_KEYS / nirs4all.ROBUSTNESS_SCENARIO_KINDS / nirs4all.ROBUSTNESS_STOCHASTIC_SCENARIO_KINDS / nirs4all.ROBUSTNESS_SCENARIO_DISTRIBUTIONS / nirs4all.ROBUSTNESS_MODES / nirs4all.ROBUSTNESS_EXECUTABLE_MODES"
portable_claim = "registry-json-contract-only"
optional_payload_fields = []
published_constants = { ROBUSTNESS_SCENARIO_DISTRIBUTIONS = ["normal", "uniform"] }
required_registry_entries = [
  "run.tuning",
  "run.tuning.engine",
  "run.tuning.space",
  "run.tuning.force_params",
  "run.tuning.score_data",
  "run.tuning.score_data.conformal_calibration",
  "predict.coverage",
  "predict.all_predictions",
  "robustness.scenarios.kind",
  "robustness.scenarios.severity",
  "robustness.scenarios.distribution",
  "robustness.X",
  "robustness.predictor",
  "robustness.predictor_bundle",
]
notes = "Bindings and app hosts may discover keywords, value schemas, UI hints, invalidation effects and grouped public discovery constants from the exported registry, but must preserve the listed registry entries and must not invent runtime support beyond their declared capabilities."
