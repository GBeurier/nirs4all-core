name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cargo test --workspace
      - run: PYTHONPATH=bindings/python/src python -m unittest discover -s bindings/python/tests
      - run: npm test --prefix bindings/wasm
