name: portable_savgol_pls
description: nirs4all PipelineConfigs syntax for Savitzky-Golay smoothing plus PLS.
random_state: 42
pipeline:
  - class: nirs4all.operators.transforms.SavitzkyGolay
    params:
      window_length: 11
      polyorder: 2
      deriv: 0
  - model:
      class: sklearn.cross_decomposition.PLSRegression
      params:
        n_components: 4
    name: PLS-4
